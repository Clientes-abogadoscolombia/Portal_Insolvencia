<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Seguimiento — Abogados Colombia</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --navy: #002855; --navy-l: #003d80; --navy-d: #001a3a;
    --gold: #c9a84c; --gold-l: #f5e6b8;
    --bg: #f8fafc; --white: #fff;
    --muted: #64748b; --light: #e2e8f0;
    --success: #10b981; --success-bg: #d1fae5;
    --warn: #f59e0b; --warn-bg: #fef3c7;
    --danger: #ef4444; --text-main: #1e293b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }
  .sf { font-family: 'Playfair Display', serif; }

  /* Login Original */
  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--navy) 0%, var(--navy-d) 100%); padding: 20px; }
  .login-box { background: var(--white); padding: 40px 30px; border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center; }
  .login-box h1 { color: var(--navy); font-size: 24px; margin-bottom: 10px; }
  .login-box p { color: var(--muted); font-size: 14px; margin-bottom: 25px; }
  .input-group { margin-bottom: 20px; text-align: left; }
  .input-group label { display: block; font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .input-group input { width: 100%; padding: 14px; border: 2px solid var(--light); border-radius: 8px; font-family: inherit; font-size: 16px; outline: none; transition: border-color 0.3s; }
  .input-group input:focus { border-color: var(--gold); }
  button { width: 100%; padding: 14px; background: var(--gold); color: var(--navy-d); border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: transform 0.2s, background 0.3s; font-family: inherit; }
  button:hover { background: #d4b55b; transform: translateY(-2px); }

  /* Dashboard Header */
  .dash-wrap { display: none; max-width: 1000px; margin: 0 auto; width: 100%; padding: 20px; }
  header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--light); margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
  .brand h2 { font-size: 22px; color: var(--navy); }
  .brand p { font-size: 14px; color: var(--muted); }
  .btn-out { background: transparent; border: 1px solid var(--light); color: var(--muted); padding: 8px 16px; width: auto; font-size: 14px; border-radius: 6px; }
  .btn-out:hover { background: var(--light); transform: none; }

  /* =========================================================
     TRACKER TIPO RAPPI (Adaptado a tus colores y celular)
     ========================================================= */
  .tracker-container { background: var(--white); padding: 30px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); margin-bottom: 30px; overflow-x: auto; border: 1px solid rgba(0,0,0,0.05);}
  .tracker-container h3 { font-size: 18px; color: var(--navy); margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
  .tracker { display: flex; justify-content: space-between; position: relative; min-width: 750px; /* Clave para el scroll horizontal en celular */ padding-bottom: 10px;}
  .step { flex: 1; text-align: center; position: relative; z-index: 2; }
  .step::before { content: ''; position: absolute; top: 22px; left: -50%; width: 100%; height: 4px; background: var(--light); z-index: -1; }
  .step:first-child::before { display: none; }
  
  .step-circle { width: 44px; height: 44px; border-radius: 50%; background: var(--white); border: 4px solid var(--light); color: var(--muted); display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-weight: bold; font-size: 18px; transition: all 0.3s; }
  .step-label { font-size: 13px; font-weight: 700; color: var(--muted); }
  .step-date { font-size: 11px; color: var(--muted); margin-top: 5px; line-height: 1.4;}
  .step-deadline { font-size: 11px; color: var(--navy-d); font-weight: bold; margin-top: 5px; background: var(--gold-l); padding: 3px 6px; border-radius: 4px; display: inline-block;}

  /* Estados del tracker */
  .step.done .step-circle { background: var(--navy); border-color: var(--navy); color: var(--white); }
  .step.done::before { background: var(--navy); }
  .step.done .step-label { color: var(--navy); }
  
  .step.active .step-circle { background: var(--gold); border-color: var(--gold); color: var(--navy-d); box-shadow: 0 0 0 0 rgba(201, 168, 76, 0.4); animation: pulse 2s infinite; }
  .step.active::before { background: var(--navy); } 
  .step.active .step-label { color: var(--navy); font-weight: 800; }

  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(201, 168, 76, 0.4); }
    70% { box-shadow: 0 0 0 15px rgba(201, 168, 76, 0); }
    100% { box-shadow: 0 0 0 0 rgba(201, 168, 76, 0); }
  }

  /* =========================================================
     TARJETAS ORIGINALES (Sin acordeones, diseño base)
     ========================================================= */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
  @media (max-width: 768px) {
    .grid { grid-template-columns: 1fr; } /* Celular: Una columna */
    .tracker-container { padding: 20px 15px; }
  }

  .card { background: var(--white); padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.05); }
  .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; border-bottom: 1px solid var(--light); padding-bottom: 15px; }
  .card-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--warn-bg); color: var(--warn); display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .card-icon.blue { background: #e0f2fe; color: #0284c7; }
  .card-title { font-size: 16px; font-weight: 700; color: var(--navy); }
  
  .info-row { display: flex; flex-direction: column; margin-bottom: 15px; }
  .info-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 4px; }
  .info-val { font-size: 15px; color: var(--text-main); font-weight: 500; }
  .highlight { color: var(--navy); font-weight: 700; font-size: 18px; }

  /* Finanzas (Exacto al original) */
  .payments { margin-top: 10px; }
  .pay-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-radius: 10px; margin-bottom: 12px; flex-wrap: wrap; gap: 10px; }
  .pay-name { font-weight: 600; color: var(--navy); width: 100%; margin-bottom: 5px; }
  .pay-row { display: flex; justify-content: space-between; width: 100%; align-items: center; }
  .pay-amount { font-size: 18px; font-weight: 700; }
  .pill { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  
  #loading, #errorMsg { display: none; text-align: center; margin-top: 15px; font-size: 14px; }
  #errorMsg { color: var(--danger); background: #fee2e2; padding: 10px; border-radius: 6px; }
</style>
<script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
</head>
<body>

<div class="login-wrap" id="loginView">
  <div class="login-box">
    <h1 class="sf">Abogados Colombia</h1>
    <p>Portal Seguro de Seguimiento</p>
    <div class="input-group">
      <label>Documento de Identidad</label>
      <input type="text" id="cedula" placeholder="Ej. 1020304050" onkeypress="if(event.key==='Enter') consultar()">
    </div>
    <button onclick="consultar()">Consultar Estado del Proceso</button>
    <div id="loading"><i class="fas fa-circle-notch fa-spin"></i> Conectando de forma segura...</div>
    <div id="errorMsg"></div>
  </div>
</div>

<div class="dash-wrap" id="dashView">
  <header>
    <div class="brand">
      <h2 class="sf">Abogados Colombia</h2>
      <p>Hola, <span id="clientName" style="font-weight:700;color:var(--navy)"></span></p>
    </div>
    <button class="btn-out" onclick="salir()"><i class="fas fa-sign-out-alt"></i> Salir</button>
  </header>

  <div id="portalContent"></div>
</div>

<script>
google.charts.load('current', {'packages':['corechart']});

const SHEET_ID = '15zG1iRk0qYJq5WdCqg5v1hIXXe9K-z6b9jM43GstF90';

// Utilidad para formatear fechas
function parseDate(v) {
  if (!v || v === "" || v === 0) return null;
  if (typeof v === "string" && v.startsWith("Date(")) {
    const parts = v.replace("Date(","").replace(")","").split(",").map(Number);
    return new Date(parts[0], parts[1], parts[2]);
  }
  const d = new Date(v);
  return (isNaN(d.getTime()) || d.getFullYear() < 2000) ? null : d;
}

function fmtDate(dateObj) {
  if(!dateObj) return "";
  return dateObj.toLocaleDateString('es-CO', { day: '2-digit', month: 'short', year: 'numeric' });
}

// Matemática de Fechas
function addDays(date, days) {
  if(!date) return null;
  let result = new Date(date);
  result.setDate(result.getDate() + days);
  return result;
}

function addBusinessDays(startDate, daysToAdd) {
  if(!startDate) return null;
  let currentDate = new Date(startDate.getTime());
  let addedDays = 0;
  while (addedDays < daysToAdd) {
    currentDate.setDate(currentDate.getDate() + 1);
    if (currentDate.getDay() !== 0 && currentDate.getDay() !== 6) { // Omite Sab y Dom
      addedDays++;
    }
  }
  return currentDate;
}

function fmtMoney(n) {
  return n ? new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(n) : "$0";
}

function consultar() {
  const c = document.getElementById("cedula").value.trim();
  if(!c) return;
  document.getElementById("errorMsg").style.display = "none";
  document.getElementById("loading").style.display = "block";
  
  // Consulta original a la Columna A (ID o Cédula según tu base)
  const qStr = `select * where A='${c}' or A=${c}`; 
  const query = new google.visualization.Query(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=CASOS&tq=${encodeURIComponent(qStr)}`);
  query.send(processRes);
}

function processRes(res) {
  document.getElementById("loading").style.display = "none";
  if(res.isError() || !res.getDataTable() || res.getDataTable().getNumberOfRows() === 0) {
    const err = document.getElementById("errorMsg");
    err.innerText = "No encontramos un proceso activo con este documento.";
    err.style.display = "block";
    return;
  }
  
  const dt = res.getDataTable();
  const row = [];
  for(let i=0; i<dt.getNumberOfColumns(); i++) {
    row.push(dt.getValue(0, i));
  }
  
  // MAPEO EXACTO BASADO EN TUS IMÁGENES (0-indexado)
  const clientData = {
    name: row[1], 
    radicado: row[2], 
    estado: String(row[3] || "En trámite"),
    juzgado: row[4], 
    promotor: row[5], 
    auto: row[6],
    // Pagos
    p_abo: {monto: row[7], pagado: row[8], fecha: row[9]},
    p_cen: {monto: row[10], pagado: row[11], fecha: row[12]},
    p_liq: {monto: row[13], pagado: row[14], fecha: row[15]},
    
    // Fechas Tracker
    docsCompletosFecha: parseDate(row[25]), // Columna Z (Índice 25)
    radicacionFecha: parseDate(row[27]),    // Columna AB (Índice 27)
    autoAdmisionFecha: parseDate(row[29]),  // Columna AD (Índice 29)
    audienciaFecha: parseDate(row[33])      // Columna AH (Índice 33)
  };

  document.getElementById("loginView").style.display = "none";
  document.getElementById("dashView").style.display = "block";
  document.getElementById("clientName").innerText = clientData.name || "Cliente";
  
  renderPortal(clientData);
}

function renderPortal(d) {
  // 1. Tracker Lógica
  const limiteAuto = addDays(d.docsCompletosFecha, 15);
  const limiteAudiencia = addBusinessDays(d.autoAdmisionFecha, 60);

  let etapaActualIndex = 0;
  if (d.docsCompletosFecha) etapaActualIndex = 1;
  if (d.radicacionFecha) etapaActualIndex = 2;
  if (d.autoAdmisionFecha) etapaActualIndex = 3;
  if (d.audienciaFecha) etapaActualIndex = 4;

  const etapas = [
    { n: "Docs Completos", fecha: d.docsCompletosFecha, limite: null },
    { n: "Radicación", fecha: d.radicacionFecha, limite: null },
    { n: "Auto de Admisión", fecha: d.autoAdmisionFecha, limite: limiteAuto, alerta: "Meta: 15 días" },
    { n: "1ra Audiencia", fecha: d.audienciaFecha, limite: limiteAudiencia, alerta: "Meta: 60 d. hábiles" },
    { n: "Resultado Final", fecha: null, limite: null }
  ];

  let stepsHtml = '';
  etapas.forEach((et, idx) => {
    let statusClass = '';
    let icon = idx + 1;
    let fechaLabel = '';

    if (idx < etapaActualIndex) {
      statusClass = 'done'; icon = '<i class="fas fa-check"></i>';
      fechaLabel = et.fecha ? `<div class="step-date" style="color:var(--navy);font-weight:600">✓ ${fmtDate(et.fecha)}</div>` : `<div class="step-date">✓ Completado</div>`;
    } else if (idx === etapaActualIndex) {
      statusClass = 'active';
      fechaLabel = `<div class="step-date" style="color:var(--navy);font-weight:bold;">En proceso</div>`;
      if (et.limite) fechaLabel += `<div class="step-deadline" title="Fecha límite estimada">Vence aprox:<br>${fmtDate(et.limite)}</div>`;
    } else {
      fechaLabel = et.alerta ? `<div class="step-date" style="opacity:0.6">${et.alerta}</div>` : `<div class="step-date" style="opacity:0.6">Pendiente</div>`;
    }

    stepsHtml += `
      <div class="step ${statusClass}">
        <div class="step-circle">${icon}</div>
        <div class="step-label">${et.n}</div>
        ${fechaLabel}
      </div>
    `;
  });

  // 2. Pagos Lógica (Idéntico a tu código original)
  const rowsPagos = [
    { name: "Honorarios Abogado", ...d.p_abo },
    { name: "Centro de Conciliación", ...d.p_cen },
    { name: "Liquidación", ...d.p_liq }
  ];
  
  let pagosHtml = '';
  rowsPagos.forEach(p => {
    if(!p.monto && !p.pagado && !p.fecha) return; 
    const isPaid = (String(p.pagado).trim().toLowerCase() === "sí" || String(p.pagado).trim().toLowerCase() === "si");
    const bg = isPaid ? "var(--success-bg)" : "var(--white)";
    const brd = isPaid ? "#bbf7d0" : "var(--light)";
    const amCol = isPaid ? "var(--success)" : "var(--navy-d)";
    const pillBg = isPaid ? "var(--success-bg)" : "var(--warn-bg)";
    const pillCol = isPaid ? "var(--success)" : "var(--warn)";
    const pillTxt = isPaid ? "✓ Pagado" : "Pendiente";
    const dateTxt = isPaid && p.fecha ? "Pagado: " + fmtDate(parseDate(p.fecha)) : p.fecha ? "Vence: " + fmtDate(parseDate(p.fecha)) : "";
    
    pagosHtml += `<div class="pay-item" style="background:${bg};border:1px solid ${brd}">
      <div class="pay-name">${p.name}</div>
      <div class="pay-row">
        <span class="pay-amount" style="color:${amCol}">${fmtMoney(p.monto)}</span>
        <span class="pill" style="color:${pillCol};background:${pillBg}">${pillTxt}</span>
      </div>
      ${dateTxt?`<div style="font-size:11px;color:var(--muted);margin-top:5px;font-weight:600"><i class="far fa-calendar-alt"></i> ${dateTxt}</div>`:""}
    </div>`;
  });
  if(!pagosHtml) pagosHtml = "<p style='font-size:14px;color:var(--muted);padding:10px 0;'>No hay información financiera registrada.</p>";

  // 3. Render Final (El Tracker + Tu Grid Original)
  const html = `
    <div class="tracker-container">
      <h3><i class="fas fa-map-signs"></i> Progreso de tu caso</h3>
      <div class="tracker">${stepsHtml}</div>
    </div>
    
    <div class="grid">
      <!-- Tarjeta 1: Detalles Legales -->
      <div class="card">
        <div class="card-header">
          <div class="card-icon blue"><i class="fas fa-gavel"></i></div>
          <div class="card-title">Detalles Legales</div>
        </div>
        <div class="info-row"><span class="info-label">Estado Actual</span><span class="info-val highlight">${d.estado}</span></div>
        <div class="info-row"><span class="info-label">No. Radicado</span><span class="info-val">${d.radicado || "Aún no asignado"}</span></div>
        <div class="info-row"><span class="info-label">Juzgado / Centro</span><span class="info-val">${d.juzgado || "En trámite"}</span></div>
        <div class="info-row"><span class="info-label">Promotor / Liquidador</span><span class="info-val">${d.promotor || "En trámite"}</span></div>
        <div class="info-row"><span class="info-label">Auto de Admisión</span><span class="info-val">${d.auto || "Pendiente"}</span></div>
      </div>
      
      <!-- Tarjeta 2: Estado Financiero -->
      <div class="card">
        <div class="card-header">
          <div class="card-icon"><i class="fas fa-wallet"></i></div>
          <div class="card-title">Estado Financiero</div>
        </div>
        <div class="payments">
          ${pagosHtml}
        </div>
      </div>
    </div>
  `;
  document.getElementById("portalContent").innerHTML = html;
}
